<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My task lister assistant</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="main-content">
    <h1>My task lister assistant</h1>

    <form id="create-task-form" action="" method="POST">
      <label for="new-task-description">Enter New Task:</label>
      <input type="text" id="new-task-description" name="new-task-description" placeholder="Task_description" required/>
        <input type="text" id="user" placeholder="Assigned To" required />
        <input type="date" id="due-date" required />
        
        <select id="priority">
            <option value="high">High Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="low">Low Priority</option>
        </select>

      <input type="submit" value="Add Task">
      <button type="button" id="sort">Sort by Priority</button>
    </form>

    <div id="list">
      <h2><b>Tasks Added:</b></h2>
      <ol id="tasks">
      </ol>
    </div>

    <script src="./src/index.js"></script>
  </div>

</body>
</html>
