<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; 
        background-color: rgb(43, 116, 226);}
        ul { list-style: none; padding: 0; }
        li { 
            margin: 5px 0; padding: 10px; 
            display: flex; justify-content: space-between; 
            align-items: center; border-radius: 5px;
        }
        .high { background-color: red; color: white; }
        .medium { background-color: yellow; color: black; }
        .low { background-color: green; color: white; }
        .delete-btn, .edit-btn { cursor: pointer; padding: 5px; margin-left: 5px; border: none; }
        .delete-btn { background: red; color: white; }
        .edit-btn { background: blue; color: white; }
    </style>
</head>
<body>
    <h2>Enhanced To-Do List</h2>
    
    <form id="task-form">
        <input type="text" id="task" placeholder="Task" required />
        <input type="text" id="user" placeholder="Assigned To" required />
        <input type="date" id="due-date" required />
        
        <select id="priority">
            <option value="high">High Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="low">Low Priority</option>
        </select>
        
        <button type="submit">Add Task</button>
        <button type="button" id="sort">Sort by Priority</button>
    </form>
    <h3>Input Live Preview:</h3>
    <p id="live-preview"></p>

    <ul id="task-list"></ul>
    <script src="./src/index.js"></script>
</body>
</html>
